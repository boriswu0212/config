# Lower escape-time for better IME (input method) compatibility
set -s escape-time 10

set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# True color support
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm*:Tc,ghostty:Tc"

# Mouse
set -g mouse on

# Start windows and panes at 1
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Scrollback
set -g history-limit 50000

# Vi copy mode
set -g mode-keys vi

# Pane borders
set -g pane-active-border-style "fg=#cba6f7"
set -g pane-border-style "fg=#45475a"

# Dim inactive panes
set -g window-style "fg=#a6adc8,bg=#1e1e2e"
set -g window-active-style "fg=#cdd6f4,bg=#11111b"

# Panes inherit current path; new windows open ~/Code
bind '"' split-window -v -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"
bind 'c' new-window -c "~/Code"

# Neovim integration
set -g focus-events on
