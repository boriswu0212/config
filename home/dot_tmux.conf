# IME (input method) needs enough time to compose multi-byte sequences
set -s escape-time 25

set -g allow-passthrough on
set -g extended-keys-format csi-u
set -as terminal-features 'xterm*:extkeys'

# True color support
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm*:Tc,ghostty:Tc"

# Mouse
set -g mouse on

# Start windows and panes at 1
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Scrollback
set -g history-limit 50000

# Vi copy mode
set -g mode-keys vi

# Panes inherit current path; new windows open ~/Code
bind '"' split-window -v -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"
bind 'c' new-window -c "~/Code"

# Neovim integration
set -g focus-events on

# Terminal title (shown in Ghostty tabs)
set -g set-titles on
set -g set-titles-string "#W"

# TPM plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'accessd/tmux-agent-indicator'
set -g @agent-indicator-notification-enabled "off"
set -g @plugin 'catppuccin/tmux'

# Catppuccin
set -g @catppuccin_flavor "macchiato"
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "off"

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'

# Status bar position and style
set -g status-position top
set -g status-style "bg=#{@thm_bg}"
set -g status-justify "absolute-centre"

# Status left
set -g status-left ""

# Status right: agent indicator
set -g status-right-length 100
set -g status-right ""
set -ga status-right "#{agent_indicator}"

# Pane border
setw -g pane-border-status top
setw -g pane-border-format ""
setw -g pane-active-border-style "bg=#{@thm_bg},fg=#{@thm_overlay_0}"
setw -g pane-border-style "bg=#{@thm_bg},fg=#{@thm_surface_0}"
setw -g pane-border-lines single

# Window list
set -wg automatic-rename on
set -g automatic-rename-format "Window"

set -g window-status-format "#[bg=#{@thm_bg},fg=#{@thm_rosewater}] #I: #{=/-40/...:pane_title} #(~/.claude/pane-states.sh '#{window_id}')#[fg=#{@thm_rosewater}] "
set -g window-status-style "bg=#{@thm_bg},fg=#{@thm_rosewater}"
set -g window-status-last-style "bg=#{@thm_bg},fg=#{@thm_peach}"
set -g window-status-activity-style "bg=#{@thm_red},fg=#{@thm_bg}"
set -g window-status-bell-style "bg=#{@thm_red},fg=#{@thm_bg},bold"
set -gF window-status-separator "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}]│"

set -g window-status-current-format "#[bg=#{@thm_peach},fg=#{@thm_bg},bold] #I: #{=/-40/...:pane_title} #(~/.claude/pane-states.sh '#{window_id}')#[fg=#{@thm_bg}] "
set -g window-status-current-style "bg=#{@thm_peach},fg=#{@thm_bg},bold"
